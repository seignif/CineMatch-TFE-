[phases.setup]
nixPkgs = [
    # Libs système requises par le Chromium de Playwright (noms nixpkgs valides)
    # Python 3.13 est auto-détecté depuis runtime.txt — ne pas le spécifier ici
    "nss", "nspr", "atk", "cups", "libdrm",
    "libxkbcommon", "gtk3", "pango", "cairo", "glib", "alsa-lib",
]

[phases.install]
cmds = [
    "python3 -m pip install -r requirements.txt",
    "python3 -m playwright install chromium",
]

[phases.build]
cmds = [
    "python manage.py collectstatic --noinput",
]

[variables]
# Empêche nixpacks d'auto-détecter playwright et d'ajouter "chromium-driver" (paquet inexistant)
# N'affecte PAS "playwright install chromium" (commande CLI indépendante)
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
PLAYWRIGHT_BROWSERS_PATH = "/app/ms-playwright"
