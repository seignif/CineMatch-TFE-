services:
  postgres:
    image: postgres:15-alpine
    container_name: cinematch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cinematch
      POSTGRES_USER: cinematch_user
      POSTGRES_PASSWORD: cinematch_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinematch_user -d cinematch"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: cinematch_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
